apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-config
  namespace: projet
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql-service:3306/yassinedb
---
apiVersion: v1
kind: Secret
metadata:
  name: spring-secret
  namespace: projet
type: Opaque
data:
  SPRING_DATASOURCE_USERNAME: cm9vdA==
  SPRING_DATASOURCE_PASSWORD: cm9vdDEyMw==
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
  namespace: projet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
        - name: spring-app
          image: yassineshili/yassine-app:1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: spring-config
            - secretRef:
                name: spring-secret
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service
  namespace: projet
spec:
  selector:
    app: spring-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
